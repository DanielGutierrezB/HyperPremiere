<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HyperPremiere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="panel-header">
    <div class="header-title">
      <h1>HyperPremiere</h1>
      <p class="subtitle">Marcadores de secuencia</p>
    </div>
    <button id="btn-update" class="btn-update" type="button" title="Buscar actualización">
      <span class="update-icon">⟳</span> <span id="version-label">v0.1.7</span>
    </button>
  </header>

  <div class="actions">
    <button id="btn-test-connection" type="button">Probar conexión</button>
    <button id="btn-load-markers" type="button" class="btn-primary">Cargar marcadores</button>
  </div>

  <main class="panel-body">
    <div id="output" class="output" aria-live="polite">
      <span class="placeholder">Pulsa "Probar conexión" para leer la secuencia activa.</span>
    </div>

    <div class="section-label">Contexto de la clase</div>
    <div class="class-context">
      <label class="field-label" for="objective">Objetivo de la clase</label>
      <textarea id="objective" rows="3" placeholder="Describe qué debe lograr el estudiante al terminar esta clase. Se usa como contexto para generar instrucciones por marcador."></textarea>
      <div class="transcript-row">
        <button id="btn-load-transcript" type="button">Cargar transcript (JSON)</button>
        <input type="file" id="transcript-file" accept="application/json,.json" hidden>
        <span id="transcript-status" class="muted">Sin transcript</span>
      </div>
    </div>

    <div class="section-label">Marcadores</div>
    <div class="markers-scroll">
      <div id="markers" class="markers"></div>
    </div>

    <details class="config-section">
      <summary>Configuración del modelo</summary>
      <div class="config-body">
        <label class="field-label" for="cfg-provider">Proveedor</label>
        <select id="cfg-provider">
          <option value="claude-cli">Claude (CLI / suscripción)</option>
          <option value="claude-api">Claude (API key)</option>
          <option value="openai-compat">API compatible (OpenAI)</option>
          <option value="ollama">Local (Ollama)</option>
        </select>

        <label class="field-label" for="cfg-model">Modelo</label>
        <select id="cfg-model">
          <option value="claude-sonnet-5">Sonnet 5 — rápido (recomendado)</option>
          <option value="claude-opus-4-8">Opus 4.8 — máxima calidad (lento)</option>
          <option value="claude-fable-5">Fable 5</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5 — el más rápido</option>
          <option value="qwen3-coder:30b">Ollama local — qwen3-coder:30b</option>
        </select>

        <div id="claude-login-row" class="config-actions">
          <button id="btn-login-claude" type="button">Iniciar sesión en Claude</button>
          <span id="login-status" class="muted"></span>
        </div>

        <label class="field-label" for="cfg-apikey">Token / API key <span class="muted">(no hace falta con Claude CLI)</span></label>
        <input type="password" id="cfg-apikey" placeholder="Solo para API key / compatible">

        <label class="field-label" for="cfg-baseurl">Base URL</label>
        <input type="text" id="cfg-baseurl" placeholder="Solo API compatible / Ollama (opcional)">

        <div class="config-actions">
          <button id="btn-save-config" type="button" class="btn-primary">Guardar</button>
          <span id="config-status" class="muted"></span>
        </div>
      </div>
    </details>
  </main>

  <script src="js/CSInterface.js"></script>
  <script src="js/store.js"></script>
  <script src="js/transcript.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
